name: Selenium Tests  # Nombre que aparece en la pestaña Actions de GitHub

# ── Cuándo se activa este pipeline ──────────────────────────────────────────
on:
  push:                        # Al subir cualquier commit
  pull_request:                # Al crear un Pull Request

# ── Trabajo principal ────────────────────────────────────────────────────────
jobs:
  test:
    runs-on: ubuntu-latest     # Servidor Linux gratuito en la nube de GitHub

    steps:

      # 1. Descargar el código del repositorio al servidor
      - name: Descargar código del repositorio
        uses: actions/checkout@v3

      # 2. Instalar Python 3.11
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Instalar Chrome (necesario para Selenium en Linux)
      - name: Instalar Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # 4. Instalar las librerías de Python (selenium, pytest, pytest-html)
      - name: Instalar dependencias de Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Ejecutar los tests y generar el reporte HTML
      #    La variable CI=true ya existe en GitHub Actions por defecto,
      #    por eso el conftest.py activa automáticamente el modo headless.
      - name: Ejecutar pruebas Selenium
        run: |
          pytest test_tienda.py \
            --html=reporte_final.html \
            --self-contained-html \
            -v

      # 6. Guardar el reporte como artefacto descargable
      #    "if: always()" garantiza que se guarda incluso si las pruebas fallan
      - name: Guardar reporte HTML como evidencia
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: reporte-selenium
          path: reporte_final.html